model_list:
  - model_name:
    litellm_params:
      model: 
      api_key: 

litellm_settings:
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  turn_off_message_logging: true   # não loga o conteúdo de prompt/resposta, só metadados/custo/latência
  drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL